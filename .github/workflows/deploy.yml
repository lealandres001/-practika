# Publica automáticamente el sitio en GitHub Pages al hacer push a main.
name: Deploy a GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto (sitio estático)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
