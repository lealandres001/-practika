# Blueprint de despliegue en Render — PRACTIKA (Vite + React + Express)
services:
  - type: web
    name: practika
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/products
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      # API key de Gemini (opcional). Sin ella, la IA usa respuestas simuladas.
      - key: GEMINI_API_KEY
        sync: false
      # Client ID público de Google para "Iniciar con Google"
      - key: GOOGLE_CLIENT_ID
        value: "698169277279-32fjbl760snfsthl7ssvdf6se5rff3s3.apps.googleusercontent.com"
